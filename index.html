<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 온라인 보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #F0F2F5;
            --white: #FFFFFF;
            --indigo: #4F46E5;
            --indigo-dark: #3730A3;
            --lavender-gray: #F3F2F8;
            --text-main: #1F2937;
            --text-sub: #6B7280;
            --border-color: #E5E7EB;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 공통 UI 요소 */
        .btn-primary { background: var(--indigo); color: white; border: none; padding: 10px 18px; border-radius: var(--radius-md); cursor: pointer; font-weight: 700; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; font-size: 14px; }
        .btn-primary:hover { background: var(--indigo-dark); }
        .btn-secondary { background: var(--white); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 18px; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; justify-content: center; font-size: 14px; }
        .btn-secondary:hover { background: #F9FAFB; }
        .form-input { width: 100%; background: var(--lavender-gray); border: 1px solid transparent; border-radius: var(--radius-md); padding: 14px; font-size: 15px; margin-bottom: 12px; transition: 0.2s; }
        .form-input:focus { outline: none; border-color: var(--indigo); background: var(--white); }
        .hidden { display: none !important; }

        /* 화면 1: 인증 화면 */
        #auth-screen { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--white); padding: 50px; border-radius: 24px; box-shadow: var(--shadow); text-align: center; width: 400px; }
        .auth-card h1 { margin-bottom: 5px; font-weight: 800; color: var(--indigo); letter-spacing: -0.5px; }
        .auth-card p { color: var(--text-sub); margin-bottom: 30px; font-size: 15px; }
        .access-code-box { background: var(--lavender-gray); padding: 20px; border-radius: var(--radius-lg); margin-bottom: 20px; }
        .access-code-box input { text-align: center; font-size: 24px; font-weight: 700; letter-spacing: 4px; color: var(--indigo); background: var(--white); border: 1px solid var(--border-color); }
        .divider { margin: 25px 0; color: #9CA3AF; display: flex; align-items: center; font-size: 13px; font-weight: 500; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); margin: 0 15px; }

        /* 화면 2: 대시보드 */
        #dashboard-screen { padding: 40px; overflow-y: auto; flex: 1; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .create-board-card { border: 2px dashed #D1D5DB; background: rgba(255,255,255,0.5); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; cursor: pointer; color: var(--text-sub); font-weight: 600; transition: 0.2s; }
        .create-board-card:hover { border-color: var(--indigo); color: var(--indigo); background: var(--white); }
        .board-card { background: var(--white); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; cursor: pointer; transition: transform 0.2s; }
        .board-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .board-card-title { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .board-card-desc { font-size: 14px; color: var(--text-sub); line-height: 1.5; flex: 1; }
        .board-card-footer { border-top: 1px solid #F3F4F6; padding-top: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* 화면 3: 개별 보드 작업 공간 */
        #board-header { padding: 20px 40px; background: var(--white); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-wrap: wrap; gap: 15px; }
        #board-workspace { flex: 1; padding: 30px 40px; overflow: auto; }
        
        .editable-title { transition: color 0.2s; margin-bottom: 4px; display: inline-block; }
        .editable-title:hover { color: var(--indigo); }

        /* 레이아웃: 섹션/자유 모드 */
        .layout-sectioned { display: flex; align-items: flex-start; gap: 30px; min-height: 100%; }
        .section-column { min-width: 360px; max-width: 360px; display: flex; flex-direction: column; gap: 20px; }
        .section-header { background: var(--indigo); color: white; padding: 15px 20px; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2); }
        .layout-freestyle { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 20px; }
        .layout-freestyle .card, .layout-freestyle .post-form-wrapper { width: calc(33.333% - 14px); min-width: 300px; }

        /* 게시물 카드 & 입력 폼 */
        .card { background: var(--white); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title { font-weight: 700; font-size: 17px; margin: 0; }
        .card-author { font-size: 12px; color: var(--text-sub); }
        .card-content { font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .media-preview { width: 100%; border-radius: 8px; object-fit: cover; max-height: 250px; margin-top: 10px; }
        .attachment-link { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; text-decoration: none; font-size: 13px; color: var(--text-main); font-weight: 600; word-break: break-all; margin-top: 5px; }
        
        .post-form-card { border: 2px solid var(--indigo); border-radius: var(--radius-lg); padding: 20px; background: var(--white); box-shadow: var(--shadow); }
        .color-picker { display: flex; gap: 8px; margin-bottom: 15px; }
        .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .color-dot.active { border-color: var(--text-main); transform: scale(1.15); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .form-tools { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-tool { background: var(--lavender-gray); color: var(--text-main); padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .btn-tool:hover { background: #E5E7EB; }

        /* 모달창 디자인 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px); }
        .modal-content { background: var(--white); padding: 40px; border-radius: 24px; width: 450px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; }
        .btn-close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 20px; color: var(--text-sub); cursor: pointer; }
        
        .qr-domain { font-size: 22px; font-weight: 800; color: #D95D39; margin-bottom: 5px; }
        .qr-subtitle { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 15px; }
        .qr-code-text { font-size: 72px; font-weight: 900; color: #5B63F5; line-height: 1; margin-bottom: 35px; letter-spacing: 2px; }

        /* 참여자 목록 카드 스타일 */
        .participant-card { border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 10px; text-align: left; background: var(--white); }
        .participant-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: var(--text-main); }
        .participant-detail { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
        
        /* 잠금 뱃지 스타일 */
        .badge-lock { background: var(--lavender-gray); color: var(--indigo); padding: 10px 16px; border-radius: 12px; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .badge-locked { background: #FEE2E2; color: #DC2626; }
    </style>
</head>
<body>

    <div id="auth-screen" class="hidden">
        <div class="auth-card">
            <h1>우리반 온라인 보드</h1>
            <p>함께 만드는 온라인 학습 공간</p>
            
            <div class="access-code-box">
                <input type="text" id="student-name" class="form-input" placeholder="이름 (예: 홍길동)" style="background:var(--white); font-size:15px; letter-spacing:normal; font-weight:600;">
                <input type="text" id="join-code" class="form-input" placeholder="000000" maxlength="6" style="margin-bottom: 15px;">
                <button class="btn-primary" style="width: 100%;" onclick="studentJoin()">보드 입장하기</button>
            </div>
            
            <div class="divider">선생님이신가요?</div>
            <button class="btn-secondary" style="width: 100%;" onclick="teacherLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 20px;">
                교사 계정으로 시작
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <div class="dashboard-header">
            <div>
                <h2 id="dash-greeting">선생님의 보드 목록</h2>
                <p style="color: var(--text-sub); margin-top: 5px;">관리 중인 학습 보드를 확인하고 새 보드를 만들어보세요.</p>
            </div>
            <button class="btn-secondary" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
        </div>
        <div class="board-grid" id="board-list-container"></div>
    </div>

    <div id="board-workspace-container" class="hidden" style="display: flex; flex-direction: column; height: 100vh;">
        <header id="board-header">
            <div class="board-title-area">
                <h2 id="current-board-title" onclick="editBoardTitle()">보드 제목</h2>
                <span id="current-user-info" style="font-size: 13px; font-weight: 600; color: var(--text-sub);"></span>
            </div>
            
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <div id="status-badge" class="badge-lock">🔓 작성 가능</div>
                <button class="btn-secondary teacher-only" id="btn-toggle-lock" onclick="toggleBoardLock()">보드 잠금</button>
                
                <button class="btn-secondary teacher-only" onclick="showParticipantsModal()"><i class="fa-solid fa-users"></i> 참여자 목록</button>
                
                <button class="btn-secondary teacher-only" onclick="addSection()"><i class="fa-solid fa-folder-plus"></i> 섹션 추가</button>
                <button class="btn-primary teacher-only" onclick="showInviteModal()"><i class="fa-solid fa-user-plus"></i> 학생 초대</button>
                <button class="btn-secondary" onclick="goToDashboard()"><i class="fa-solid fa-house"></i> 나가기</button>
            </div>
        </header>

        <div id="board-workspace">
            <div id="board-render-area">
                </div>
        </div>
    </div>

    <div id="modal-board-form" class="modal-overlay hidden">
        <div class="modal-content" style="text-align: left;">
            <button class="btn-close-modal" onclick="closeModal('modal-board-form')"><i class="fa-solid fa-xmark"></i></button>
            <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 20px;">새 보드 만들기</h2>
            <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block;">보드 제목</label>
            <input type="text" id="new-board-title" class="form-input" placeholder="예: 국어 질문방">
            <label style="font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; margin-top: 10px;">보드 설명 (선택)</label>
            <textarea id="new-board-desc" class="form-input" rows="3" placeholder="학생들에게 보여줄 안내 사항"></textarea>
            <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="saveBoard()">저장하기</button>
        </div>
    </div>

    <div id="modal-invite" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="btn-close-modal" onclick="closeModal('modal-invite')"><i class="fa-solid fa-xmark"></i></button>
            <div class="qr-domain">2board.netlify.app</div>
            <div class="qr-subtitle">접속 후 방번호 입력</div>
            <div class="qr-code-text" id="display-access-code">000000</div>
            
            <button class="btn-secondary" style="width: 100%; padding: 15px;" onclick="copyDirectLink()">링크 복사</button>
        </div>
    </div>

    <div id="modal-participants" class="modal-overlay hidden">
        <div class="modal-content" style="width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 20px; font-weight: 800; margin: 0;">참여자 목록</h2>
                <button class="btn-secondary" style="padding: 6px 12px; font-size: 13px;" onclick="closeModal('modal-participants')">닫기</button>
            </div>
            
            <div id="participants-list-container" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB29-sMOLGpBEefRZoqfy8oPzzo8Ed571M",
            authDomain: "board-d417d.firebaseapp.com",
            projectId: "board-d417d",
            storageBucket: "board-d417d.firebasestorage.app",
            messagingSenderId: "580625108615",
            appId: "1:580625108615:web:855970b773bce3d4def222"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.currentUser = null;
        window.currentBoard = null;
        window.boardPosts = [];
        window.activeParticipants = [];
        window.unsubscribePosts = null;
        window.unsubscribeBoard = null;
        window.unsubscribeParticipants = null;
        window.activeFormSectionId = null;

        // 수정된 진한 파스텔톤 6색
        const colors = ['#FFFFFF', '#F48FB1', '#FFF59D', '#90CAF9', '#A5D6A7', '#CE93D8'];

        // --- 0. 접속 관리 및 초기화 ---
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.has('code')) document.getElementById('join-code').value = params.get('code');

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    window.currentUser = { uid: user.uid, name: user.displayName, email: user.email, role: 'teacher' };
                    const savedBoardId = sessionStorage.getItem('currentBoardId');
                    if (savedBoardId) await restoreBoard(savedBoardId);
                    else showDashboard();
                } else {
                    const studentData = sessionStorage.getItem('studentInfo');
                    if (studentData) {
                        const parsed = JSON.parse(studentData);
                        window.currentUser = { uid: parsed.uid, name: parsed.name, role: 'student' };
                        const q = query(collection(db, "boards"), where("accessCode", "==", parsed.code));
                        const snap = await getDocs(q);
                        if (!snap.empty) {
                            window.currentBoard = { id: snap.docs[0].id, ...snap.docs[0].data() };
                            openBoardWorkspace();
                        } else {
                            sessionStorage.clear();
                            document.getElementById('auth-screen').classList.remove('hidden');
                        }
                    } else {
                        document.getElementById('auth-screen').classList.remove('hidden');
                    }
                }
            });
        };

        async function restoreBoard(boardId) {
            const snap = await getDocs(query(collection(db, "boards")));
            const docData = snap.docs.find(d => d.id === boardId);
            if (docData) {
                window.currentBoard = { id: docData.id, ...docData.data() };
                openBoardWorkspace();
            } else {
                sessionStorage.removeItem('currentBoardId');
                showDashboard();
            }
        }

        // 브라우저 종료/새로고침 시 접속 기록 삭제 시도
        window.addEventListener('beforeunload', () => {
            if(window.currentUser && window.currentBoard) {
                const pRef = doc(db, "board_participants", `${window.currentUser.uid}_${window.currentBoard.id}`);
                deleteDoc(pRef).catch(()=>{});
            }
        });

        // --- 1. 로그인 ---
        window.teacherLogin = async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } 
            catch (error) { alert("로그인 실패"); }
        }

        window.studentJoin = async () => {
            const name = document.getElementById('student-name').value.trim();
            const code = document.getElementById('join-code').value.trim();
            if (!name || code.length !== 6) return alert("이름과 6자리 방번호를 정확히 입력해주세요.");

            const q = query(collection(db, "boards"), where("accessCode", "==", code));
            const snap = await getDocs(q);
            if (snap.empty) return alert("해당 방번호를 가진 보드를 찾을 수 없습니다.");

            window.currentBoard = { id: snap.docs[0].id, ...snap.docs[0].data() };
            window.currentUser = { uid: 'stu_' + Date.now(), name: name, role: 'student' };
            sessionStorage.setItem('studentInfo', JSON.stringify({ uid: window.currentUser.uid, name: name, code: code }));
            
            openBoardWorkspace();
        }

        window.logout = async () => {
            await removeParticipantRecord();
            sessionStorage.clear();
            if (window.currentUser?.role === 'teacher') await signOut(auth);
            window.currentUser = null;
            location.reload();
        }

        // --- 2. 대시보드 ---
        function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('board-workspace-container').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('dash-greeting').innerText = `${window.currentUser.name} 선생님의 보드 목록`;
            
            const q = query(collection(db, "boards"), where("teacherId", "==", window.currentUser.uid));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('board-list-container');
                container.innerHTML = `<div class="create-board-card" onclick="openCreateBoardModal()"><i class="fa-solid fa-circle-plus" style="font-size: 32px; margin-bottom: 15px;"></i>새로운 보드 만들기</div>`;
                
                const boards = [];
                snapshot.forEach(doc => boards.push({ id: doc.id, ...doc.data() }));
                boards.sort((a, b) => b.createdAt - a.createdAt);

                boards.forEach(b => {
                    container.innerHTML += `
                        <div class="board-card" onclick="enterTeacherBoard('${b.id}')">
                            <div><div class="board-card-title">${b.title}</div><div class="board-card-desc">${b.description || ''}</div></div>
                            <div class="board-card-footer">
                                <span class="badge-lock" style="padding:4px 10px; font-size:13px;">방번호: ${b.accessCode}</span>
                                <button onclick="event.stopPropagation(); deleteBoard('${b.id}')" style="background:none; border:none; cursor:pointer; color:var(--text-sub);"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        window.openCreateBoardModal = () => {
            document.getElementById('new-board-title').value = '';
            document.getElementById('new-board-desc').value = '';
            document.getElementById('modal-board-form').classList.remove('hidden');
        }

        window.saveBoard = async () => {
            const title = document.getElementById('new-board-title').value.trim();
            const desc = document.getElementById('new-board-desc').value.trim();
            if (!title) return alert("제목을 입력하세요.");
            
            try {
                await addDoc(collection(db, "boards"), {
                    title, description: desc, 
                    accessCode: Math.floor(100000 + Math.random() * 900000).toString(),
                    teacherId: window.currentUser.uid,
                    sections: [{ id: 'sec_' + Date.now(), title: '💡 오늘의 배움' }],
                    isLocked: false, 
                    createdAt: Date.now()
                });
                closeModal('modal-board-form');
            } catch (e) { alert("보드 생성 실패"); }
        }

        window.deleteBoard = async (boardId) => {
            if(confirm("보드를 삭제하시겠습니까?")) await deleteDoc(doc(db, "boards", boardId));
        }

        // --- 3. 보드 진입 및 실시간 관리 ---
        window.enterTeacherBoard = async (boardId) => {
            const snap = await getDocs(query(collection(db, "boards")));
            const docData = snap.docs.find(d => d.id === boardId);
            window.currentBoard = { id: docData.id, ...docData.data() };
            sessionStorage.setItem('currentBoardId', docData.id);
            openBoardWorkspace();
        }

        async function openBoardWorkspace() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('board-workspace-container').classList.remove('hidden');
            
            document.getElementById('current-user-info').innerText = `${window.currentUser.name} (${window.currentUser.role === 'teacher' ? '교사' : '학생'})`;
            
            const titleEl = document.getElementById('current-board-title');
            if (window.currentUser.role === 'teacher') {
                titleEl.className = 'editable-title';
                titleEl.title = '클릭하여 보드 제목 수정';
                titleEl.style.cursor = 'pointer';
            } else {
                titleEl.className = '';
                titleEl.title = '';
                titleEl.style.cursor = 'default';
            }

            document.querySelectorAll('.teacher-only').forEach(el => {
                el.style.display = window.currentUser.role === 'teacher' ? 'inline-flex' : 'none';
            });

            await recordParticipant();

            if(window.unsubscribeBoard) window.unsubscribeBoard();
            window.unsubscribeBoard = onSnapshot(doc(db, "boards", window.currentBoard.id), (docSnapshot) => {
                window.currentBoard = { id: docSnapshot.id, ...docSnapshot.data() };
                updateBoardHeaderUI();
                renderBoardLayout(); 
            });

            if (window.unsubscribePosts) window.unsubscribePosts();
            window.unsubscribePosts = onSnapshot(query(collection(db, "posts"), where("boardId", "==", window.currentBoard.id)), (snapshot) => {
                const posts = [];
                snapshot.forEach(d => posts.push({ id: d.id, ...d.data() }));
                posts.sort((a, b) => b.createdAt - a.createdAt);
                window.boardPosts = posts;
                renderBoardLayout();
            });

            if(window.currentUser.role === 'teacher') {
                if(window.unsubscribeParticipants) window.unsubscribeParticipants();
                window.unsubscribeParticipants = onSnapshot(query(collection(db, "board_participants"), where("boardId", "==", window.currentBoard.id)), (snapshot) => {
                    window.activeParticipants = [];
                    snapshot.forEach(d => window.activeParticipants.push(d.data()));
                    renderParticipantsList();
                });
            }
        }

        function updateBoardHeaderUI() {
            document.getElementById('current-board-title').innerText = window.currentBoard.title;
            const badge = document.getElementById('status-badge');
            const toggleBtn = document.getElementById('btn-toggle-lock');
            
            if (window.currentBoard.isLocked) {
                badge.innerText = '🔒 보드 잠금됨';
                badge.className = 'badge-lock badge-locked';
                toggleBtn.innerText = '보드 해제';
            } else {
                badge.innerText = '🔓 작성 가능';
                badge.className = 'badge-lock';
                toggleBtn.innerText = '보드 잠금';
            }
        }

        window.goToDashboard = async () => {
            await removeParticipantRecord();
            if (window.unsubscribePosts) window.unsubscribePosts();
            if (window.unsubscribeBoard) window.unsubscribeBoard();
            if (window.unsubscribeParticipants) window.unsubscribeParticipants();
            
            if (window.currentUser.role === 'teacher') {
                sessionStorage.removeItem('currentBoardId');
                showDashboard();
            } else {
                logout();
            }
        }

        window.editBoardTitle = async () => {
            if (window.currentUser.role !== 'teacher') return;
            const newTitle = prompt("보드 제목을 수정하세요:", window.currentBoard.title);
            if (newTitle && newTitle.trim() !== '' && newTitle !== window.currentBoard.title) {
                try {
                    await updateDoc(doc(db, "boards", window.currentBoard.id), { title: newTitle.trim() });
                } catch (e) {
                    alert("제목 수정 중 오류가 발생했습니다.");
                }
            }
        }

        // --- 4. 렌더링 (잠금 상태 적용) ---
        function renderBoardLayout() {
            const container = document.getElementById('board-render-area');
            container.innerHTML = '';
            
            const sections = window.currentBoard.sections || [];
            const isLocked = window.currentBoard.isLocked === true;
            const canWrite = !isLocked || window.currentUser.role === 'teacher';

            if (sections.length > 0) {
                container.className = 'layout-sectioned';
                sections.forEach(sec => {
                    const secPosts = window.boardPosts.filter(p => p.sectionId === sec.id);
                    const colDiv = document.createElement('div');
                    colDiv.className = 'section-column';
                    
                    let teacherActions = window.currentUser.role === 'teacher' ? `
                        <div class="section-actions">
                            <button onclick="editSection('${sec.id}')"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteSection('${sec.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>` : '';

                    let formAreaHtml = '';
                    if (canWrite) {
                        formAreaHtml = window.activeFormSectionId === sec.id 
                            ? getPostFormHTML(sec.id) 
                            : `<button class="btn-secondary" style="width:100%; border:2px dashed #D1D5DB;" onclick="openForm('${sec.id}')">+ 새 의견 남기기</button>`;
                    }

                    colDiv.innerHTML = `
                        <div class="section-header"><span style="font-weight:700; font-size:16px;">${sec.title}</span>${teacherActions}</div>
                        <div style="display:flex; flex-direction:column; gap:15px;">
                            ${formAreaHtml}
                            ${renderPostsHTML(secPosts, canWrite)}
                        </div>`;
                    container.appendChild(colDiv);
                });
            } else {
                container.className = 'layout-freestyle';
                let addBtnHtml = '';
                if (canWrite) {
                    addBtnHtml = window.activeFormSectionId === 'freestyle' 
                        ? getPostFormHTML('freestyle') 
                        : `<div class="post-form-wrapper"><button class="btn-secondary" style="width:100%; height:100px; border:2px dashed #D1D5DB;" onclick="openForm('freestyle')">+ 새 게시물 추가</button></div>`;
                }
                container.innerHTML = addBtnHtml + renderPostsHTML(window.boardPosts, canWrite);
            }
        }

        function renderPostsHTML(posts, canWrite) {
            return posts.map(post => {
                const isAuthor = window.currentUser.uid === post.authorId;
                const isTeacher = window.currentUser.role === 'teacher';
                const canEditDelete = isTeacher || (canWrite && isAuthor);
                const canMove = isTeacher && (window.currentBoard.sections || []).length > 0;

                let controls = '';
                if (canEditDelete) {
                    controls += `<button onclick="editPost('${post.id}')" style="background:none; border:none; cursor:pointer; color:var(--text-sub); margin-left:8px;" title="수정"><i class="fa-solid fa-pen"></i></button>`;
                    controls += `<button onclick="deletePost('${post.id}')" style="background:none; border:none; cursor:pointer; color:var(--text-sub); margin-left:8px;" title="삭제"><i class="fa-solid fa-trash"></i></button>`;
                }
                if (canMove) {
                    controls = `<button onclick="movePost('${post.id}')" style="background:none; border:none; cursor:pointer; color:var(--text-sub); margin-left:8px;" title="이동"><i class="fa-solid fa-arrow-right-arrow-left"></i></button>` + controls;
                }

                return `
                    <div class="card" style="background-color: ${post.color || '#FFFFFF'}">
                        <div class="card-header">
                            <div class="card-title">${post.title}</div>
                            <div>${controls}</div>
                        </div>
                        <div class="card-author"><i class="fa-solid fa-user"></i> ${post.authorName}</div>
                        <div class="card-content">${post.content}</div>
                        
                        ${post.imageUrl ? `<img src="${post.imageUrl}" class="media-preview">` : ''}
                        ${post.fileUrl ? `<a href="${post.fileUrl}" target="_blank" class="attachment-link"><i class="fa-solid fa-file-arrow-down"></i> 첨부파일 보기</a>` : ''}
                        ${post.link ? `<a href="${post.link}" target="_blank" class="attachment-link" style="background:rgba(79,70,229,0.1); color:var(--indigo);"><i class="fa-solid fa-link"></i> ${post.link}</a>` : ''}
                    </div>
                `;
            }).join('');
        }

        // --- 5. 보드 잠금 관리 ---
        window.toggleBoardLock = async () => {
            const newState = !window.currentBoard.isLocked;
            await updateDoc(doc(db, "boards", window.currentBoard.id), { isLocked: newState });
        }

        // --- 6. 참여자 관리 로직 ---
        async function recordParticipant() {
            const pRef = doc(db, "board_participants", `${window.currentUser.uid}_${window.currentBoard.id}`);
            await setDoc(pRef, {
                boardId: window.currentBoard.id,
                uid: window.currentUser.uid,
                name: window.currentUser.name,
                email: window.currentUser.email || '',
                role: window.currentUser.role,
                joinTime: Date.now()
            });
        }
        
        async function removeParticipantRecord() {
            if(window.currentUser && window.currentBoard) {
                const pRef = doc(db, "board_participants", `${window.currentUser.uid}_${window.currentBoard.id}`);
                await deleteDoc(pRef).catch(()=>{});
            }
        }

        window.showParticipantsModal = () => {
            renderParticipantsList();
            document.getElementById('modal-participants').classList.remove('hidden');
        }

        function formatTimeAgo(ms) {
            const diff = Math.floor((Date.now() - ms) / 60000);
            if (diff < 1) return '방금 전';
            if (diff < 60) return `${diff}분 전`;
            return `${Math.floor(diff/60)}시간 전`;
        }

        function renderParticipantsList() {
            const container = document.getElementById('participants-list-container');
            if(window.activeParticipants.length === 0) {
                container.innerHTML = '<p style="color:var(--text-sub); text-align:center;">참여자가 없습니다.</p>';
                return;
            }
            
            const sorted = [...window.activeParticipants].sort((a,b) => b.joinTime - a.joinTime);
            
            container.innerHTML = sorted.map(p => {
                const icon = p.role === 'teacher' ? '👩‍🏫' : '🧑‍🎓';
                const emailHtml = p.email ? `<div class="participant-detail">${p.email}</div>` : '';
                return `
                    <div class="participant-card">
                        <div class="participant-name">${p.name} ${icon}</div>
                        ${emailHtml}
                        <div class="participant-detail">입장: ${formatTimeAgo(p.joinTime)}</div>
                    </div>
                `;
            }).join('');
        }

        // --- 7. 게시물 작성 및 파일 업로드 ---
        window.openForm = (secId) => { window.activeFormSectionId = secId; renderBoardLayout(); }
        window.closeForm = () => { window.activeFormSectionId = null; renderBoardLayout(); }

        window.getPostFormHTML = (secId) => {
            const colorDots = colors.map((c, i) => `<div class="color-dot ${i===0?'active':''}" style="background-color: ${c}" onclick="selectColor(this, '${c}', '${secId}')"></div>`).join('');
            return `
                <div class="post-form-wrapper" id="wrapper-${secId}">
                    <div class="post-form-card" id="form-${secId}">
                        <div class="color-picker">${colorDots}</div>
                        <input type="hidden" id="color-${secId}" value="#FFFFFF">
                        <input type="text" class="form-input" id="title-${secId}" placeholder="제목을 입력하세요">
                        <textarea class="form-input" id="content-${secId}" rows="3" placeholder="내용을 입력하세요" style="resize:none;"></textarea>
                        
                        <div class="form-tools">
                            <label class="btn-tool"><i class="fa-regular fa-image"></i> 이미지 <input type="file" id="img-${secId}" accept="image/*" class="hidden" onchange="previewText('${secId}', '이미지 첨부됨')"></label>
                            <label class="btn-tool"><i class="fa-solid fa-paperclip"></i> 파일 <input type="file" id="file-${secId}" class="hidden" onchange="previewText('${secId}', '파일 첨부됨')"></label>
                            <button class="btn-tool" onclick="promptLink('${secId}')"><i class="fa-solid fa-link"></i> 링크</button>
                        </div>
                        
                        <div id="preview-${secId}" style="font-size: 12px; color: var(--indigo); margin-bottom: 10px;"></div>
                        <input type="hidden" id="link-${secId}" value="">
                        
                        <div style="display:flex; gap:10px;">
                            <button class="btn-primary" style="flex:1;" onclick="submitPost('${secId}')">게시하기</button>
                            <button class="btn-secondary" onclick="closeForm()">취소</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.selectColor = (el, color, secId) => {
            const dots = el.parentElement.querySelectorAll('.color-dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(`color-${secId}`).value = color;
            document.getElementById(`form-${secId}`).style.backgroundColor = color;
        }
        window.promptLink = (secId) => {
            const url = prompt("첨부할 링크를 입력하세요:");
            if (url) { document.getElementById(`link-${secId}`).value = url; previewText(secId, `링크 첨부됨: ${url}`); }
        }
        window.previewText = (secId, text) => { document.getElementById(`preview-${secId}`).innerText += `\n✓ ${text}`; }

        window.submitPost = async (secId) => {
            const title = document.getElementById(`title-${secId}`).value.trim();
            const content = document.getElementById(`content-${secId}`).value.trim();
            const color = document.getElementById(`color-${secId}`).value;
            const link = document.getElementById(`link-${secId}`).value;
            const imgFile = document.getElementById(`img-${secId}`)?.files[0];
            const attachFile = document.getElementById(`file-${secId}`)?.files[0];

            if (!title || !content) return alert("제목과 내용을 모두 입력해주세요.");

            const postData = {
                boardId: window.currentBoard.id,
                sectionId: secId === 'freestyle' ? 'none' : secId,
                title, content, color, link,
                authorId: window.currentUser.uid,
                authorName: window.currentUser.name,
                createdAt: Date.now(),
                imageUrl: null, fileUrl: null
            };

            document.getElementById(`form-${secId}`).style.opacity = '0.5';

            try {
                if (imgFile) {
                    const imgRef = ref(storage, `images/${Date.now()}_${imgFile.name}`);
                    await uploadBytes(imgRef, imgFile);
                    postData.imageUrl = await getDownloadURL(imgRef);
                }
                if (attachFile) {
                    const fileRef = ref(storage, `files/${Date.now()}_${attachFile.name}`);
                    await uploadBytes(fileRef, attachFile);
                    postData.fileUrl = await getDownloadURL(fileRef);
                }

                await addDoc(collection(db, "posts"), postData);
                window.activeFormSectionId = null;
                renderBoardLayout();
            } catch (e) { alert("게시물 업로드 중 오류가 발생했습니다."); }
        }

        // --- 8. 게시물 및 섹션 제어 ---
        window.deletePost = async (postId) => { if(confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "posts", postId)); }
        window.editPost = async (postId) => {
            const post = window.boardPosts.find(p => p.id === postId);
            const newTitle = prompt("제목 수정:", post.title);
            const newContent = prompt("내용 수정:", post.content);
            if (newTitle && newContent) await updateDoc(doc(db, "posts", postId), { title: newTitle, content: newContent });
        }
        window.movePost = async (postId) => {
            const sections = window.currentBoard.sections || [];
            let pText = "이동할 섹션 번호를 입력하세요:\n";
            sections.forEach((s, idx) => pText += `${idx + 1}. ${s.title}\n`);
            const choice = prompt(pText);
            const secIdx = parseInt(choice) - 1;
            if (secIdx >= 0 && secIdx < sections.length) await updateDoc(doc(db, "posts", postId), { sectionId: sections[secIdx].id });
        }

        window.addSection = async () => {
            const title = prompt("새 섹션 이름:");
            if (title) await updateDoc(doc(db, "boards", window.currentBoard.id), { sections: [...(window.currentBoard.sections || []), { id: 'sec_' + Date.now(), title }] });
        }
        window.editSection = async (secId) => {
            const sections = window.currentBoard.sections;
            const target = sections.find(s => s.id === secId);
            const newTitle = prompt("섹션 이름 수정:", target.title);
            if (newTitle && newTitle !== target.title) {
                target.title = newTitle;
                await updateDoc(doc(db, "boards", window.currentBoard.id), { sections });
            }
        }
        window.deleteSection = async (secId) => {
            if(!confirm("섹션을 삭제하시겠습니까?")) return;
            const updatedSections = window.currentBoard.sections.filter(s => s.id !== secId);
            await updateDoc(doc(db, "boards", window.currentBoard.id), { sections: updatedSections });
            const targetPosts = window.boardPosts.filter(p => p.sectionId === secId);
            for (let p of targetPosts) await updateDoc(doc(db, "posts", p.id), { sectionId: 'none' });
        }

        // --- 9. 모달창 제어 ---
        window.showInviteModal = () => {
            document.getElementById('display-access-code').innerText = window.currentBoard.accessCode;
            document.getElementById('modal-invite').classList.remove('hidden');
        }
        window.closeModal = (modalId) => { document.getElementById(modalId).classList.add('hidden'); }
        window.copyDirectLink = () => {
            const url = `https://2board.netlify.app?code=${window.currentBoard.accessCode}`;
            navigator.clipboard.writeText(url).then(() => { alert(`학생 배포용 링크가 복사되었습니다.\n${url}`); });
        }
    </script>
</body>
</html>
